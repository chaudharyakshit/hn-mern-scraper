<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Shadow on floor -->
  <ellipse cx="200" cy="370" rx="140" ry="14" fill="#e8d5c0" opacity="0.4"/>

  <!-- ===== PLANT (left side) ===== -->
  <rect x="52" y="300" width="36" height="50" rx="6" fill="#c8956c"/>
  <rect x="48" y="296" width="44" height="10" rx="5" fill="#d4a574"/>
  <!-- Leaves -->
  <path d="M70 296 C60 260 40 250 55 230" stroke="#43a047" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M70 296 C75 255 95 248 85 225" stroke="#43a047" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M70 296 C55 270 35 275 45 255" stroke="#66bb6a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <ellipse cx="55" cy="228" rx="14" ry="10" fill="#43a047" transform="rotate(-20 55 228)"/>
  <ellipse cx="85" cy="223" rx="14" ry="10" fill="#66bb6a" transform="rotate(15 85 223)"/>
  <ellipse cx="45" cy="253" rx="11" ry="8" fill="#81c784" transform="rotate(-30 45 253)"/>

  <!-- ===== CHAIR ===== -->
  <!-- Chair back -->
  <rect x="165" y="210" width="90" height="110" rx="12" fill="#f5deb3"/>
  <rect x="165" y="210" width="90" height="110" rx="12" fill="none" stroke="#d4a574" stroke-width="2"/>
  <!-- Chair seat -->
  <rect x="155" y="310" width="110" height="14" rx="7" fill="#d4a574"/>
  <!-- Chair legs -->
  <rect x="168" y="324" width="6" height="40" rx="3" fill="#c8956c"/>
  <rect x="246" y="324" width="6" height="40" rx="3" fill="#c8956c"/>
  <!-- Chair arm rests -->
  <rect x="155" y="270" width="10" height="44" rx="5" fill="#d4a574"/>
  <rect x="255" y="270" width="10" height="44" rx="5" fill="#d4a574"/>

  <!-- ===== PERSON ===== -->
  <!-- Head -->
  <circle cx="210" cy="195" r="30" fill="#ffcc99"/>
  <!-- Hair -->
  <path d="M180 190 C180 160 210 148 240 160 C245 170 245 190 240 190 C238 175 215 168 195 172 C185 175 180 183 180 190Z" fill="#2d2d2d"/>
  <!-- Eyes -->
  <circle cx="200" cy="197" r="2.5" fill="#2d2d2d"/>
  <circle cx="220" cy="197" r="2.5" fill="#2d2d2d"/>
  <!-- Mouth -->
  <path d="M205 208 Q210 213 215 208" stroke="#c17f4a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="180" cy="197" rx="5" ry="7" fill="#f0b882"/>
  <ellipse cx="240" cy="197" rx="5" ry="7" fill="#f0b882"/>

  <!-- Torso (orange hoodie) -->
  <path d="M190 225 C190 220 230 220 230 225 L238 310 C238 315 182 315 182 310 Z" fill="#ff6600"/>
  <!-- Hoodie collar -->
  <path d="M198 225 Q210 235 222 225" stroke="#e55a00" stroke-width="2.5" fill="none"/>
  <!-- Hoodie pocket -->
  <rect x="196" y="275" width="28" height="16" rx="4" fill="#e55a00" opacity="0.6"/>

  <!-- Left arm (reaching to laptop) -->
  <path d="M190 240 C170 260 160 275 175 295" stroke="#ff6600" stroke-width="16" fill="none" stroke-linecap="round"/>
  <circle cx="175" cy="295" r="8" fill="#ffcc99"/>
  <!-- Right arm -->
  <path d="M230 240 C250 260 260 275 248 295" stroke="#ff6600" stroke-width="16" fill="none" stroke-linecap="round"/>
  <circle cx="248" cy="295" r="8" fill="#ffcc99"/>

  <!-- Legs (dark jeans) -->
  <path d="M195 310 C193 330 188 350 185 365" stroke="#2c3e6b" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M225 310 C227 330 232 350 235 365" stroke="#2c3e6b" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="183" cy="368" rx="16" ry="8" fill="#ff6600"/>
  <ellipse cx="237" cy="368" rx="16" ry="8" fill="#ff6600"/>

  <!-- ===== LAPTOP ===== -->
  <!-- Screen -->
  <rect x="135" y="275" width="75" height="50" rx="5" fill="#333" transform="rotate(8 172 300)"/>
  <rect x="139" y="279" width="67" height="42" rx="3" fill="#e3f2fd" transform="rotate(8 172 300)"/>
  <!-- Code lines on screen -->
  <rect x="147" y="288" width="30" height="3" rx="1.5" fill="#ff6600" transform="rotate(8 172 300)"/>
  <rect x="147" y="295" width="45" height="2.5" rx="1" fill="#90caf9" transform="rotate(8 172 300)"/>
  <rect x="147" y="302" width="35" height="2.5" rx="1" fill="#a5d6a7" transform="rotate(8 172 300)"/>
  <rect x="147" y="309" width="40" height="2.5" rx="1" fill="#90caf9" transform="rotate(8 172 300)"/>
  <!-- Laptop base -->
  <rect x="130" y="322" width="85" height="7" rx="3.5" fill="#555"/>

  <!-- ===== FLOATING UI CARDS ===== -->
  <!-- Card 1 (top right) -->
  <g transform="translate(290, 155)">
    <rect width="70" height="48" rx="8" fill="white" stroke="#ff6600" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="10" y="10" width="32" height="5" rx="2.5" fill="#ff6600"/>
    <rect x="10" y="20" width="50" height="3.5" rx="1.5" fill="#eee"/>
    <rect x="10" y="28" width="40" height="3.5" rx="1.5" fill="#eee"/>
    <rect x="10" y="36" width="45" height="3.5" rx="1.5" fill="#eee"/>
  </g>

  <!-- Card 2 (right middle) -->
  <g transform="translate(300, 215)">
    <rect width="62" height="42" rx="8" fill="white" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="10" y="10" width="24" height="5" rx="2.5" fill="#ffb74d"/>
    <rect x="10" y="20" width="42" height="3.5" rx="1.5" fill="#eee"/>
    <rect x="10" y="28" width="34" height="3.5" rx="1.5" fill="#eee"/>
  </g>

  <!-- Card 3 (top left) -->
  <g transform="translate(100, 150)">
    <rect width="55" height="40" rx="8" fill="white" stroke="#ff6600" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="16" cy="16" r="7" fill="#ffcc80"/>
    <rect x="28" y="12" width="18" height="3.5" rx="1.5" fill="#eee"/>
    <rect x="28" y="19" width="14" height="3.5" rx="1.5" fill="#eee"/>
    <rect x="10" y="30" width="35" height="3" rx="1.5" fill="#f5f5f5"/>
  </g>

  <!-- Small box (drawer/side table) -->
  <rect x="100" y="330" width="40" height="35" rx="4" fill="#d4a574"/>
  <rect x="108" y="340" width="24" height="8" rx="2" fill="#c8956c"/>
  <rect x="118" y="342" width="4" height="4" rx="2" fill="#b0845a"/>

  <!-- Filter for subtle shadow -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
</svg>
